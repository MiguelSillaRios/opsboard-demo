<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsBoard · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0e1116;
  --panel:#161b22;
  --panel-2:#1c2129;
  --border:#2a313c;
  --text:#e6edf3;
  --muted:#8b95a3;
  --accent:#3b82f6;
  --accent-soft:#1d3557;
  --ok:#22c55e;
  --warn:#f59e0b;
  --ko:#ef4444;
  --pend:#475569;
  --susp:#a855f7;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;min-height:100vh}

/* ====== TOP BAR ====== */
.topbar{
  display:flex;align-items:center;gap:24px;
  padding:14px 24px;background:var(--panel);
  border-bottom:1px solid var(--border);
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-weight:700;font-size:15px;letter-spacing:-.01em;
}
.brand-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#a855f7)}
.brand small{color:var(--muted);font-weight:500;margin-left:4px}

.topbar nav{display:flex;gap:4px;margin-left:8px}
.tab{
  padding:8px 14px;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--muted);
  transition:all .15s;border:1px solid transparent;
}
.tab:hover{color:var(--text);background:var(--panel-2)}
.tab.active{background:var(--panel-2);color:var(--text);border-color:var(--border)}

.topbar .spacer{flex:1}
.user-switcher{
  display:flex;align-items:center;gap:10px;
  padding:6px 10px 6px 6px;background:var(--panel-2);
  border:1px solid var(--border);border-radius:10px;
}
.user-switcher .avatar{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;color:#0e1116;
}
.user-switcher select{
  background:transparent;color:var(--text);border:none;
  font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;
}
.user-switcher select option{background:var(--panel)}
.role-badge{
  padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;
}
.role-manager{background:rgba(59,130,246,.15);color:#60a5fa}
.role-operativo{background:rgba(168,85,247,.15);color:#c084fc}

.topbar .clock{
  font-family:'JetBrains Mono',monospace;font-size:13px;
  color:var(--muted);font-weight:500;
}

/* ====== MAIN ====== */
main{flex:1;overflow:auto;padding:20px 24px}
.view{display:none}
.view.active{display:block}
.view-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;gap:16px;flex-wrap:wrap;
}
.view-title{font-size:20px;font-weight:700;letter-spacing:-.02em}
.view-sub{color:var(--muted);font-size:13px;margin-top:2px}

/* Buttons */
.btn{
  padding:8px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--panel-2);color:var(--text);cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:500;
  transition:all .15s;display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{border-color:var(--accent);background:var(--panel)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:white}
.btn-primary:hover{background:#2563eb}
.btn-danger{background:var(--ko);border-color:var(--ko);color:white}
.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn-ghost:hover{color:var(--text);background:var(--panel-2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-lg{padding:14px 22px;font-size:15px;font-weight:600}

/* ====== PLANIFICADOR (manager) ====== */
.planner-toolbar{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  padding:12px 14px;background:var(--panel);border:1px solid var(--border);
  border-radius:10px;margin-bottom:12px;
}
.planner-toolbar .group{display:flex;gap:6px;align-items:center}
.planner-toolbar label{color:var(--muted);font-size:12px;font-weight:500}
.planner-toolbar input[type=date],.planner-toolbar select{
  background:var(--panel-2);color:var(--text);border:1px solid var(--border);
  padding:6px 10px;border-radius:6px;font-family:inherit;font-size:13px;
}

.planner-grid-wrap{
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  overflow:auto;max-height:calc(100vh - 240px);
}
.planner-grid{
  display:grid;width:100%;
  grid-template-columns:80px repeat(var(--num-personas), minmax(140px,1fr));
}
.planner-grid > div{
  padding:8px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);
  font-size:12px;min-height:42px;display:flex;align-items:center;
}
.planner-grid .ph-head{
  position:sticky;top:0;background:var(--panel-2);font-weight:600;
  text-align:center;justify-content:center;font-size:12px;
  border-bottom:2px solid var(--border);z-index:5;
}
.planner-grid .ph-time{
  position:sticky;left:0;background:var(--panel-2);font-family:'JetBrains Mono',monospace;
  font-weight:600;color:var(--muted);justify-content:center;z-index:4;
  border-right:2px solid var(--border);
}
.planner-grid .ph-head.ph-time{z-index:6}

.task-cell{
  flex-direction:column;align-items:stretch !important;justify-content:center;
  padding:4px !important;gap:3px;cursor:default;
}
.task-cell.empty{cursor:pointer;background:transparent}
.task-cell.empty:hover{background:rgba(59,130,246,.06)}
.task-chip{
  padding:5px 7px;border-radius:5px;font-size:11px;font-weight:500;
  background:var(--panel-2);border-left:3px solid var(--pend);
  display:flex;justify-content:space-between;align-items:center;gap:4px;
  transition:all .15s;cursor:grab;
}
.task-chip:hover{filter:brightness(1.1);transform:translateX(1px)}
.task-chip:active{cursor:grabbing}
.task-chip.s-pendiente{border-left-color:var(--pend)}
.task-chip.s-iniciada{border-left-color:var(--warn);background:rgba(245,158,11,.12)}
.task-chip.s-ok{border-left-color:var(--ok);background:rgba(34,197,94,.12);opacity:.85}
.task-chip.s-ko{border-left-color:var(--ko);background:rgba(239,68,68,.18)}
.task-chip.s-susp{border-left-color:var(--susp);background:rgba(168,85,247,.12)}
.task-chip .t-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-chip .t-status{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  padding:1px 4px;border-radius:3px;background:rgba(255,255,255,.08)}

.persona-pill{
  display:inline-flex;align-items:center;gap:6px;font-size:12px;
}
.persona-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ====== MIS TAREAS (operativo) ====== */
.mytasks-wrap{display:grid;grid-template-columns:1fr;gap:10px;max-width:900px;margin:0 auto}
.mytask-card{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:16px 18px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;
  transition:all .2s;border-left:4px solid var(--pend);
}
.mytask-card.s-iniciada{border-left-color:var(--warn);background:linear-gradient(90deg,rgba(245,158,11,.08),var(--panel) 30%)}
.mytask-card.s-ok{border-left-color:var(--ok);opacity:.7}
.mytask-card.s-ko{border-left-color:var(--ko);background:linear-gradient(90deg,rgba(239,68,68,.1),var(--panel) 30%)}
.mytask-time{
  font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;
  color:var(--muted);min-width:70px;text-align:center;
}
.mytask-card.s-iniciada .mytask-time{color:var(--warn)}
.mytask-card.s-ok .mytask-time{color:var(--ok)}
.mytask-card.s-ko .mytask-time{color:var(--ko)}
.mytask-info h4{font-size:15px;font-weight:600;margin-bottom:3px}
.mytask-info .meta{color:var(--muted);font-size:12px;display:flex;gap:10px;flex-wrap:wrap}
.mytask-actions{display:flex;gap:8px;align-items:center}
.countdown{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);min-width:60px;text-align:right}
.countdown.urgent{color:var(--warn)}
.countdown.late{color:var(--ko);font-weight:700}

/* ====== TV VIEW ====== */
.tv-wrap{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:16px;
}
.tv-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);
}
.tv-header h2{font-size:24px;letter-spacing:-.02em}
.tv-header .clock-big{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:600;color:var(--accent)}
.tv-legend{display:flex;gap:14px;font-size:12px;color:var(--muted)}
.tv-legend span{display:inline-flex;align-items:center;gap:6px}
.tv-legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.tv-grid{
  display:grid;gap:8px;
  grid-template-columns:140px repeat(var(--tv-cols), minmax(110px,1fr));
}
.tv-grid > div{
  padding:6px 8px;border-radius:6px;font-size:11px;min-height:36px;
  display:flex;align-items:center;
}
.tv-grid .tv-h{background:var(--panel-2);font-weight:600;justify-content:center;font-size:11px;color:var(--muted)}
.tv-grid .tv-p{background:var(--panel-2);font-weight:600;font-size:13px;color:var(--text)}
.tv-task{
  flex-direction:column;align-items:stretch !important;
  padding:5px 7px !important;gap:2px;
  background:var(--panel-2);border-left:3px solid var(--pend);
}
.tv-task.s-iniciada{background:rgba(245,158,11,.18);border-left-color:var(--warn)}
.tv-task.s-ok{background:rgba(34,197,94,.18);border-left-color:var(--ok)}
.tv-task.s-ko{background:rgba(239,68,68,.22);border-left-color:var(--ko)}
.tv-task.s-susp{background:rgba(168,85,247,.18);border-left-color:var(--susp)}
.tv-task .tt{font-weight:600;font-size:11px;line-height:1.2;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.tv-task .ts{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);font-weight:600}

/* ====== KPIs ====== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.kpi-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px}
.kpi-card .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.kpi-card .value{font-size:32px;font-weight:700;letter-spacing:-.03em;margin:6px 0 2px;font-family:'JetBrains Mono',monospace}
.kpi-card .delta{font-size:11px;color:var(--muted)}
.kpi-card .delta.up{color:var(--ok)}
.kpi-card .delta.down{color:var(--ko)}

.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:18px}
@media (max-width:900px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px}
.chart-card h3{font-size:14px;margin-bottom:12px;font-weight:600}
.chart-card .chart-box{position:relative;height:280px}

table.data{width:100%;border-collapse:collapse;font-size:12px}
table.data th,table.data td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
table.data th{background:var(--panel-2);color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
table.data tbody tr:hover{background:var(--panel-2)}
.bar-cell{display:flex;align-items:center;gap:8px}
.bar-cell .bar{flex:1;height:6px;background:var(--panel-2);border-radius:3px;overflow:hidden}
.bar-cell .bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#a855f7);border-radius:3px}
.bar-cell .num{font-family:'JetBrains Mono',monospace;font-weight:600;min-width:48px;text-align:right}

/* ====== MODAL ====== */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;z-index:100;
  backdrop-filter:blur(4px);
}
.modal-bg.show{display:flex}
.modal{
  background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:24px;width:min(520px,92vw);max-height:85vh;overflow:auto;
}
.modal h3{font-size:18px;margin-bottom:14px;letter-spacing:-.01em}
.modal-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.modal-row label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.modal-row input,.modal-row select,.modal-row textarea{
  background:var(--panel-2);border:1px solid var(--border);color:var(--text);
  padding:9px 11px;border-radius:7px;font-family:inherit;font-size:13px;
}
.modal-row textarea{min-height:70px;resize:vertical}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* ====== TOAST ====== */
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{
  background:var(--panel);border:1px solid var(--border);border-left:4px solid var(--accent);
  padding:12px 16px;border-radius:8px;font-size:13px;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
  animation:slidein .25s ease, slideout .25s ease 2.7s forwards;
  min-width:240px;
}
.toast.success{border-left-color:var(--ok)}
.toast.error{border-left-color:var(--ko)}
.toast.warn{border-left-color:var(--warn)}
@keyframes slidein{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideout{to{transform:translateX(120%);opacity:0}}

/* ====== Utils ====== */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state h3{font-size:16px;margin-bottom:6px;color:var(--text)}
.muted{color:var(--muted)}
.scroll-x{overflow-x:auto}

/* drag styles */
.task-chip.dragging{opacity:.4}
.task-cell.drop-target{background:rgba(59,130,246,.15);outline:2px dashed var(--accent);outline-offset:-2px}

/* loading */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--panel-2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<header class="topbar" style="display:none" id="topbar">

<main id="mainArea" style="display:none">

</main>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast-wrap" id="toasts"></div>

-04-30T16:02:00","hf":"2026-04-30T16:58:00","p":"Miguel","d":"2026-04-30T00:00:00","ht":"16:30:00"},{"t":"Gestión de envíos especiales","hi":"2026-04-30T16:03:13.031745","hf":"2026-04-30T16:25:00","p":"Ana","d":"2026-04-30T00:00:00","ht":"16:30:00"},{"t":"Revisión de retrasos hasta 17:00","hi":"2026-04-30T16:41:12.822333","hf":"2026-04-30T16:53:00","p":"Elena","d":"2026-04-30T00:00:00","ht":"17:00:00"},{"t":"Reprogramación de rutas no cargadas","hi":"2026-04-30T16:37:02.412904","hf":"2026-04-30T16:55:00","p":"Pablo","d":"2026-04-30T00:00:00","ht":"17:00:00"},{"t":"Volumen estimado mañana","hi":"2026-04-30T17:12:35.205885","hf":"2026-04-30T17:25:00","p":"Carlos","d":"2026-04-30T00:00:00","ht":"17:30:00"},{"t":"Bandeja de mails procesada","hi":"2026-04-30T17:45:00","hf":"2026-04-30T18:43:00","p":"Laura","d":"2026-04-30T00:00:00","ht":"18:00:00"},{"t":"Registro de tareas del día","hi":"2026-04-30T18:25:00","hf":"2026-04-30T18:25:57","p":"TODOS","d":"2026-04-30T00:00:00","ht":"18:30:00"}]}</script>

<script>
// ======================================================================
// OpsBoard - Demo pública (datos simulados)
// ======================================================================

const DATA = JSON.parse(document.getElementById('appdata').textContent);
const STORE_KEY = 'opsboard_demo_v1';

// ----------------------------------------------------------------------
// STATE
// ----------------------------------------------------------------------
let STATE = {
  user: 'MANAGER',
  view: 'planner',
  date: todayISO(),
  ejecuciones: {},  // { 'YYYY-MM-DD::tarea::personaAsignada': {inicio, fin, status} }
  asignaciones: {}, // { 'YYYY-MM-DD::tarea': 'PERSONA' } - overrides puntuales
  ausencias: {},    // legacy: { 'YYYY-MM-DD::PERSONA': true } (se mantiene por compatibilidad)
  ausenciasRangos: [], // [{persona, desde:'YYYY-MM-DD', hasta:'YYYY-MM-DD', motivo}]
  reglasReasign: [],   // [{id, persona, desde, hasta, dias?:[L,M,X...], tareas?:['nombre',...]|'todas', destino:'PERSONA'|['P1','P2',...] (round-robin)}]
  tareasExtra: []
};

// Cargar último mes (abril 2026) como ejecuciones precargadas en STATE inicial
function bootstrapFromUltimoMes() {
  const ej = {};
  for (const r of DATA.ultimo_mes) {
    if (!r.d || !r.t || !r.p) continue;
    const fecha = r.d.substring(0,10);
    const key = `${fecha}::${normalizar(r.t)}::${r.p}`;
    let status = 'ok';
    let inicio = r.hi, fin = r.hf;
    if (fin && inicio) {
      const dInicio = new Date(inicio);
      const dFin = new Date(fin);
      if (isNaN(dInicio.getTime()) || isNaN(dFin.getTime())) continue;
      const dur = (dFin - dInicio) / 60000;
      if (!isFinite(dur) || dur < 0 || dur > 1440) continue;
      if (dur < 2) status = 'susp';
    }
    if (!fin) status = 'iniciada';
    // KO si la hora teórica pasó y no se finalizó a tiempo
    if (r.ht && fin) {
      const horaFin = new Date(fin);
      const [hh,mm] = r.ht.split(':');
      const horaTeo = new Date(fecha);
      horaTeo.setHours(parseInt(hh), parseInt(mm), 0, 0);
      if (!isNaN(horaFin.getTime()) && !isNaN(horaTeo.getTime()) && horaFin > horaTeo) status = 'ko';
    }
    ej[key] = {inicio, fin, status};
  }
  return ej;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      STATE = {...STATE, ...parsed};
    } else {
      STATE.ejecuciones = bootstrapFromUltimoMes();
      saveState();
    }
  } catch(e) {
    console.warn('Error cargando state, usando default', e);
    STATE.ejecuciones = bootstrapFromUltimoMes();
  }
}

function saveState() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      user: STATE.user,
      ejecuciones: STATE.ejecuciones,
      asignaciones: STATE.asignaciones,
      ausencias: STATE.ausencias,
      ausenciasRangos: STATE.ausenciasRangos,
      reglasReasign: STATE.reglasReasign,
      tareasExtra: STATE.tareasExtra
    }));
  } catch(e) {
    toast('No se pudo guardar (localStorage lleno)', 'error');
  }
}

// ----------------------------------------------------------------------
// HELPERS
// ----------------------------------------------------------------------
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function normalizar(s) {
  return (s||'').toString().trim().toLowerCase();
}
function pad(n){return String(n).padStart(2,'0')}
function fmtTime(d){
  if (!d) return '';
  const dt = typeof d==='string' ? new Date(d) : d;
  return `${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
}
function fmtDateLong(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${dias[dt.getDay()]}, ${dt.getDate()} de ${meses[dt.getMonth()]} ${dt.getFullYear()}`;
}
function diaSemanaCode(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  const dia = new Date(y, m-1, d).getDay();
  // 0=dom 1=lun ... mapeamos: 1->L 2->M 3->X 4->J 5->V 6->S
  return ['','L','M','X','J','V','S',''][dia] || null;
}
function colorPersona(nombre) {
  const p = DATA.personas.find(x => x.nombre === nombre);
  return p ? p.color : '#888';
}
function rolDe(user) {
  return user === 'MANAGER' ? 'manager' : 'operativo';
}
function operativos() {
  // Personas individuales (no binomios) - excluyo grupos con "/"
  return DATA.personas.filter(p => !p.nombre.includes('/') && p.nombre !== 'TODOS').map(p => p.nombre);
}

// ----------------------------------------------------------------------
// AUSENCIAS Y REGLAS DE REASIGNACIÓN
// ----------------------------------------------------------------------
function estaAusente(persona, iso) {
  // Compatibilidad con formato viejo
  if (STATE.ausencias[`${iso}::${persona}`]) return true;
  // Rangos
  for (const r of STATE.ausenciasRangos) {
    if (r.persona === persona && iso >= r.desde && iso <= r.hasta) return true;
  }
  return false;
}

function ausenciasActivasDelDia(iso) {
  // Devuelve [{persona, motivo, hasta?}, ...] sin duplicados
  const out = new Map();
  for (const k of Object.keys(STATE.ausencias)) {
    if (k.startsWith(iso+'::')) {
      const p = k.split('::')[1];
      if (!out.has(p)) out.set(p, {persona:p, motivo:'puntual', hasta:iso, esRango:false, key:k});
    }
  }
  for (const r of STATE.ausenciasRangos) {
    if (iso >= r.desde && iso <= r.hasta) {
      out.set(r.persona, {persona:r.persona, motivo:r.motivo||'ausencia', desde:r.desde, hasta:r.hasta, esRango:true, id:r.id});
    }
  }
  return [...out.values()];
}

function aplicarReglasReasignacion(tarea, iso) {
  // Devuelve la persona destino tras aplicar reglas, o null si ninguna aplica
  const dCode = diaSemanaCode(iso);
  for (const r of STATE.reglasReasign) {
    if (iso < r.desde || iso > r.hasta) continue;
    if (r.dias && r.dias.length && !r.dias.includes(dCode)) continue;
    // ¿afecta esta tarea?
    if (r.tareas !== 'todas') {
      if (!r.tareas.includes(tarea.nombre)) continue;
    }
    // ¿es de la persona objetivo?
    if (r.persona !== tarea.personaHabitual) continue;
    // Aplica → devolver destino
    if (Array.isArray(r.destino)) {
      // Round-robin determinista por hash simple del nombre+fecha
      const seed = (tarea.nombre + iso).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
      return r.destino[seed % r.destino.length];
    }
    return r.destino;
  }
  return null;
}

// ----------------------------------------------------------------------
// CÁLCULO DE TAREAS DEL DÍA
// ----------------------------------------------------------------------
function tareasDelDia(iso) {
  const dCode = diaSemanaCode(iso);
  const out = [];

  // 1. Diarias
  for (const t of DATA.tareas_diarias) {
    if (!dCode) continue;
    if (!t.dias[dCode]) continue;
    if (!t.persona_habitual) continue;
    out.push({
      id: `D::${t.tarea}::${iso}`,
      tipo: 'diaria',
      nombre: t.tarea,
      texto: t.texto_planner || t.tarea,
      hora: t.hora || '00:00',
      personaHabitual: t.persona_habitual,
      suplente: t.suplente,
      fecha: iso
    });
  }

  // 2. Mensuales que coincidan con esta fecha
  for (const t of DATA.tareas_mensuales) {
    if (!t.fecha_proxima) continue;
    const fp = t.fecha_proxima.substring(0,10);
    if (fp !== iso) continue;
    out.push({
      id: `M::${t.descripcion}::${iso}`,
      tipo: 'mensual',
      nombre: t.descripcion,
      texto: t.descripcion,
      hora: t.hora || '00:00',
      personaHabitual: t.persona_habitual,
      suplente: t.suplente,
      fecha: iso
    });
  }

  // 3. Puntuales que caigan ese día
  for (const t of DATA.tareas_puntuales) {
    if (!t.fecha) continue;
    if (t.fecha.substring(0,10) !== iso) continue;
    out.push({
      id: `P::${t.descripcion}::${iso}`,
      tipo: 'puntual',
      nombre: t.descripcion,
      texto: t.descripcion,
      hora: t.hora || '00:00',
      personaHabitual: t.persona_habitual,
      suplente: null,
      fecha: iso
    });
  }

  // 4. Tareas extra creadas por el manager
  for (const t of STATE.tareasExtra) {
    if (t.fecha !== iso) continue;
    out.push({
      id: `X::${t.nombre}::${iso}::${t.hora}`,
      tipo: 'extra',
      nombre: t.nombre,
      texto: t.nombre,
      hora: t.hora || '00:00',
      personaHabitual: t.persona,
      suplente: null,
      fecha: iso
    });
  }

  // Aplicar reasignaciones del manager y ausencias (orden de prioridad)
  for (const t of out) {
    const overrideKey = `${iso}::${normalizar(t.nombre)}`;
    // 1. Override puntual del manager (drag&drop o reasignación tarea-a-tarea)
    if (STATE.asignaciones[overrideKey]) {
      t.personaAsignada = STATE.asignaciones[overrideKey];
    }
    // 2. Regla de reasignación masiva activa
    else {
      const reglaDestino = aplicarReglasReasignacion(t, iso);
      if (reglaDestino) {
        t.personaAsignada = reglaDestino;
      }
      // 3. Habitual ausente → suplente
      else if (estaAusente(t.personaHabitual, iso) && t.suplente && !estaAusente(t.suplente, iso)) {
        t.personaAsignada = t.suplente;
      }
      // 4. Por defecto: persona habitual
      else {
        t.personaAsignada = t.personaHabitual;
      }
    }
    // Estado
    const ekey = `${iso}::${normalizar(t.nombre)}::${t.personaAsignada}`;
    const ej = STATE.ejecuciones[ekey];
    if (ej) {
      t.estado = ej.status;
      t.inicio = ej.inicio;
      t.fin = ej.fin;
    } else {
      // KO si pasó la hora y nadie inició
      const ahora = new Date();
      const horaFin = new Date(`${iso}T${t.hora}:00`);
      if (ahora > horaFin && iso <= todayISO()) {
        t.estado = 'ko-no-iniciada';
      } else {
        t.estado = 'pendiente';
      }
    }
  }

  // Ordenar por hora
  out.sort((a,b) => a.hora.localeCompare(b.hora));
  return out;
}

// ----------------------------------------------------------------------
// ACCIONES
// ----------------------------------------------------------------------
function iniciarTarea(tarea) {
  const ekey = `${tarea.fecha}::${normalizar(tarea.nombre)}::${tarea.personaAsignada}`;
  STATE.ejecuciones[ekey] = {
    inicio: new Date().toISOString(),
    fin: null,
    status: 'iniciada'
  };
  saveState();
  render();
  toast(`Tarea iniciada: ${tarea.nombre}`, 'success');
}

function finalizarTarea(tarea) {
  const ekey = `${tarea.fecha}::${normalizar(tarea.nombre)}::${tarea.personaAsignada}`;
  const ej = STATE.ejecuciones[ekey];
  if (!ej) return;
  const ahora = new Date();
  ej.fin = ahora.toISOString();
  // Determinar status
  const horaFin = new Date(`${tarea.fecha}T${tarea.hora}:00`);
  let status = 'ok';
  if (ahora > horaFin) status = 'ko';
  // Sospechoso si <2 min
  const dur = (ahora - new Date(ej.inicio)) / 60000;
  if (dur < 2 && status === 'ok') status = 'susp';
  ej.status = status;
  saveState();
  render();
  if (status === 'ok') toast(`Finalizada OK: ${tarea.nombre}`, 'success');
  else if (status === 'susp') toast(`Finalizada (revisar duración)`, 'warn');
  else toast(`Finalizada FUERA DE PLAZO: ${tarea.nombre}`, 'error');
}

function reasignarTarea(tarea, nuevaPersona) {
  const okey = `${tarea.fecha}::${normalizar(tarea.nombre)}`;
  if (nuevaPersona === tarea.personaHabitual) {
    delete STATE.asignaciones[okey];
  } else {
    STATE.asignaciones[okey] = nuevaPersona;
  }
  // Limpiar ejecución si se reasigna (se va con la persona nueva)
  const ekeyVieja = `${tarea.fecha}::${normalizar(tarea.nombre)}::${tarea.personaAsignada}`;
  if (STATE.ejecuciones[ekeyVieja]) {
    const ekeyNueva = `${tarea.fecha}::${normalizar(tarea.nombre)}::${nuevaPersona}`;
    STATE.ejecuciones[ekeyNueva] = STATE.ejecuciones[ekeyVieja];
    delete STATE.ejecuciones[ekeyVieja];
  }
  saveState();
  render();
  toast(`Reasignada a ${nuevaPersona}`, 'success');
}

function marcarAusente(persona, fecha) {
  // Ausencia de un solo día (compat)
  STATE.ausencias[`${fecha}::${persona}`] = true;
  saveState();
  toast(`${persona} marcado/a como ausente`, 'warn');
  render();
}

function quitarAusencia(persona, fecha) {
  delete STATE.ausencias[`${fecha}::${persona}`];
  // También elimino rangos que cubran ese día concreto si la ausencia fuese de un día
  saveState();
  toast(`Ausencia eliminada`, 'success');
  render();
}

function añadirAusenciaRango(persona, desde, hasta, motivo) {
  const id = 'aus_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
  STATE.ausenciasRangos.push({id, persona, desde, hasta, motivo: motivo||'vacaciones'});
  saveState();
  toast(`Ausencia añadida: ${persona} del ${desde} al ${hasta}`, 'success');
  render();
}

function eliminarAusenciaRango(id) {
  STATE.ausenciasRangos = STATE.ausenciasRangos.filter(r => r.id !== id);
  saveState();
  toast('Ausencia eliminada', 'success');
  render();
}

// ----------------------------------------------------------------------
// MODAL
// ----------------------------------------------------------------------
function modal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
}
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target.id === 'modalBg') closeModal();
});

function modalCrearTarea() {
  const ops = operativos();
  modal(`
    <h3>Nueva tarea puntual</h3>
    <div class="modal-row">
      <label>Descripción</label>
      <input type="text" id="ct-desc" placeholder="Ej: Llamar agencia X">
    </div>
    <div class="modal-row">
      <label>Fecha</label>
      <input type="date" id="ct-fecha" value="${STATE.date}">
    </div>
    <div class="modal-row">
      <label>Hora</label>
      <input type="time" id="ct-hora" value="10:00">
    </div>
    <div class="modal-row">
      <label>Persona asignada</label>
      <select id="ct-persona">
        ${ops.map(p => `<option value="${p}">${p}</option>`).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="crearTarea()">Crear tarea</button>
    </div>
  `);
}
function crearTarea() {
  const desc = document.getElementById('ct-desc').value.trim();
  const fecha = document.getElementById('ct-fecha').value;
  const hora = document.getElementById('ct-hora').value;
  const persona = document.getElementById('ct-persona').value;
  if (!desc) { toast('Falta descripción', 'error'); return; }
  STATE.tareasExtra.push({nombre: desc, fecha, hora, persona});
  saveState();
  closeModal();
  toast('Tarea creada', 'success');
  render();
}

  const hasta = document.getElementById('rm-hasta').value;

  if (!persona || !desde || !hasta) { toast('Faltan campos', 'error'); return; }
  if (hasta < desde) { toast('Rango de fechas inválido', 'error'); return; }

function renderClock() {
  const fmt = () => {
    const d = new Date();
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  };
  document.getElementById('clockSmall').textContent = fmt();
}
setInterval(() => {
  document.getElementById('clockSmall').textContent = (() => {
    const d = new Date();
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  })();
  // Refresco vivo de algunas vistas
  if (STATE.view === 'tv' || STATE.view === 'mytasks') {
    // Actualizar countdowns sin re-render completo
    document.querySelectorAll('[data-countdown]').forEach(el => {
      el.textContent = computeCountdown(el.dataset.countdown);
      el.className = 'countdown ' + countdownClass(el.dataset.countdown);
    });
  }
}, 1000);

function computeCountdown(isoTime) {
  // isoTime = "YYYY-MM-DDTHH:MM"
  const target = new Date(isoTime+':00');
  const diff = (target - new Date()) / 60000;
  if (diff <= 0) return 'vencida';
  if (diff < 60) return `${Math.ceil(diff)}min`;
  return `${Math.floor(diff/60)}h ${Math.ceil(diff%60)}min`;
}
function countdownClass(isoTime) {
  const diff = (new Date(isoTime+':00') - new Date()) / 60000;
  if (diff <= 0) return 'late';
  if (diff < 30) return 'urgent';
  return '';
}

function renderPlanner() {

      <strong style="color:var(--warn)">Ausentes hoy:</strong> ${ausentesHoy.map(a => {
        const txt = a.esRango ? `${a.persona} <span class="muted">(${a.motivo}, hasta ${a.hasta})</span>` : `${a.persona}`;

        return `${txt} ${btn}`;
      }).join(' · ')}
    </div>` : ''}

    <div class="planner-grid-wrap">
      <div class="planner-grid" style="--num-personas:${ops.length}">
        <div class="ph-head ph-time">Hora</div>
        ${ops.map(p => `<div class="ph-head" style="border-top:3px solid ${colorPersona(p)}">
          ${p}${estaAusente(p,fecha)?' <span style="color:var(--warn);font-size:10px">(ausente)</span>':''}
        </div>`).join('')}

        ${horas.map(h => `

function taskChipHTML(t) {
  const statusLabel = {
    'pendiente':'·',
    'iniciada':'I',
    'ok':'OK',
    'ko':'KO',
    'ko-no-iniciada':'!!',
    'susp':'⚠'
  }[t.estado] || '·';
  const cls = {
    'pendiente':'s-pendiente',
    'iniciada':'s-iniciada',
    'ok':'s-ok',
    'ko':'s-ko',
    'ko-no-iniciada':'s-ko',
    'susp':'s-susp'
  }[t.estado] || 's-pendiente';
  return `<div class="task-chip ${cls}" draggable="true"
              ondragstart="dragStart(event,'${t.id}','${t.fecha}','${t.nombre.replace(/'/g,"\\'")}','${t.personaAsignada}')"
              onclick='openTaskDetail(${JSON.stringify(t).replace(/'/g, "&apos;")})'>
    <span class="t-name" title="${t.texto}">${t.texto}</span>
    <span class="t-status">${statusLabel}</span>
  </div>`;
}

let _dragData = null;
function dragStart(e, id, fecha, nombre, persona) {
  _dragData = {id, fecha, nombre, persona};
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
  setTimeout(()=>e.target.classList.remove('dragging'),0);
}
function dropTask(e, nuevaPersona) {
  e.preventDefault();
  document.querySelectorAll('.drop-target').forEach(el=>el.classList.remove('drop-target'));
  if (!_dragData) return;
  const {fecha, nombre, persona} = _dragData;
  if (persona === nuevaPersona) return;
  // Reconstruir tarea simplificada
  reasignarTarea({fecha, nombre, personaAsignada: persona, personaHabitual: persona}, nuevaPersona);
  _dragData = null;
}

function openTaskDetail(t) {
  const isMgr = rolDe(STATE.user) === 'manager';
  // descripción larga (búsqueda aproximada en catálogo)
  const desc = DATA.descripciones.find(d => d.toLowerCase().includes(t.nombre.toLowerCase().substring(0,20))) || '';

  modal(`
    <h3>${t.nombre}</h3>

    <div class="modal-row">

    </div>
  `);
}

function cambiaDia(delta) {
  // Trabajar con componentes y/m/d para evitar problemas de zona horaria
  const [y,m,d] = STATE.date.split('-').map(Number);
  const dt = new Date(y, m-1, d); // local, sin TZ
  dt.setDate(dt.getDate()+delta);
  STATE.date = `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
  render();
}

// ----- MIS TAREAS (Operativo) -----
function renderMyTasks() {
  const fecha = todayISO();
  const todas = tareasDelDia(fecha);
  const mias = todas.filter(t => t.personaAsignada === STATE.user);

  // Stats rápidos del día
  const ok = mias.filter(t => t.estado==='ok' || t.estado==='susp').length;
  const ko = mias.filter(t => t.estado==='ko' || t.estado==='ko-no-iniciada').length;
  const pend = mias.filter(t => t.estado==='pendiente').length;
  const ini = mias.filter(t => t.estado==='iniciada').length;

  document.getElementById('view-mytasks').innerHTML = `
    <div class="view-header">
      <div>
        <div class="view-title">Mis tareas de hoy</div>
        <div class="view-sub">${fmtDateLong(fecha)} · ${mias.length} tareas asignadas</div>
      </div>
      <div style="display:flex;gap:14px;font-size:12px">
        <span><strong style="color:var(--ok);font-size:18px">${ok}</strong> OK</span>
        <span><strong style="color:var(--warn);font-size:18px">${ini}</strong> En curso</span>
        <span><strong style="color:var(--pend);font-size:18px">${pend}</strong> Pendientes</span>

      <div class="empty-state">
        <h3>No tienes tareas asignadas hoy</h3>
        <p>Disfruta el día (o pregúntale al manager 😉)</p>

      <div class="mytasks-wrap">
        ${mias.map(t => mytaskCardHTML(t)).join('')}
      </div>
    `}
  `;
}

function mytaskCardHTML(t) {
  const isMine = t.personaAsignada === STATE.user;
  const cls = {
    'pendiente':'',
    'iniciada':'s-iniciada',
    'ok':'s-ok',
    'susp':'s-ok',
    'ko':'s-ko',
    'ko-no-iniciada':'s-ko'
  }[t.estado] || '';
  const targetTime = `${t.fecha}T${t.hora}`;

  let actions = '';
  if (isMine) {
    if (t.estado === 'pendiente' || t.estado === 'ko-no-iniciada') {
      actions = `<button class="btn btn-primary btn-lg" onclick='iniciarTareaById("${t.id}")'>▶ Iniciar</button>`;
    } else if (t.estado === 'iniciada') {
      actions = `<button class="btn btn-danger btn-lg" onclick='finalizarTareaById("${t.id}")'>■ Finalizar</button>`;
    } else if (t.estado === 'ok' || t.estado === 'susp') {
      actions = `<span style="color:var(--ok);font-weight:600">✓ Hecho</span>`;
    } else {
      actions = `<span style="color:var(--ko);font-weight:600">✗ KO</span>`;
    }
  }

  return `<div class="mytask-card ${cls}">
    <div class="mytask-time">${t.hora}</div>
    <div class="mytask-info">
      <h4>${t.texto}</h4>
      <div class="meta">
        <span>${t.tipo}</span>
        ${t.estado === 'pendiente' || t.estado === 'iniciada' ? `<span data-countdown="${targetTime}" class="countdown ${countdownClass(targetTime)}">${computeCountdown(targetTime)}</span>` : ''}
        ${t.inicio ? `<span class="muted">▶ ${fmtTime(t.inicio)}</span>` : ''}
        ${t.fin ? `<span class="muted">■ ${fmtTime(t.fin)}</span>` : ''}
      </div>
    </div>
    <div class="mytask-actions">${actions}</div>
  </div>`;
}

function iniciarTareaById(id) {
  const t = tareasDelDia(todayISO()).find(x => x.id === id);
  if (t) iniciarTarea(t);
}
function finalizarTareaById(id) {
  const t = tareasDelDia(todayISO()).find(x => x.id === id);
  if (t) finalizarTarea(t);
}

// ----- TV VIEW -----
function renderTV() {
  const fecha = todayISO();
  const tareas = tareasDelDia(fecha);
  const ops = operativos().filter(p => !estaAusente(p, fecha));

  // Franjas horarias presentes
  const horas = [...new Set(tareas.map(t => t.hora))].sort();

  // Matriz persona x hora

    if (!matriz[t.personaAsignada]) continue;

  const now = new Date();
  const clockBig = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

  document.getElementById('view-tv').innerHTML = `
    <div class="tv-wrap">
      <div class="tv-header">
        <div>
          <h2>Estado del día</h2>
          <div class="muted" style="font-size:13px">${fmtDateLong(fecha)}</div>
        </div>
        <div class="tv-legend">
          <span><i style="background:var(--pend)"></i> Pendiente</span>
          <span><i style="background:var(--warn)"></i> Iniciada</span>
          <span><i style="background:var(--ok)"></i> OK</span>
          <span><i style="background:var(--susp)"></i> Sospechosa</span>
          <span><i style="background:var(--ko)"></i> KO</span>
        </div>
        <div class="clock-big" id="tvClock">${clockBig}</div>
      </div>

      ${horas.length === 0 ? `<div class="empty-state"><h3>No hay tareas para hoy</h3></div>` : `
        <div class="scroll-x">
          <div class="tv-grid" style="--tv-cols:${horas.length}">
            <div class="tv-h tv-p">Persona</div>
            ${horas.map(h => `<div class="tv-h">${h}</div>`).join('')}

            ${ops.map(p => `
              <div class="tv-p">

              </div>
              ${horas.map(h => {

                if (tts.length === 0) return `<div></div>`;

                  ${tts.map(t => `<div class="tv-task s-${t.estado.replace('ko-no-iniciada','ko')}">
                    <span class="tt">${t.texto}</span>
                    <span class="ts">${t.estado.toUpperCase()}</span>

  // Refresco TV cada 15s

  }, 15000);
}

// ----- KPIs -----
function renderKPIs() {
  // Construir dataset combinado: histórico + ejecuciones del último mes y nuevas
  const all = []; // {tarea, persona, fecha, status, duracionMin}

  // Helper: parsear fecha de forma segura
  function safeDate(s) {
    if (!s) return null;
    const d = new Date(s);
    return isNaN(d.getTime()) ? null : d;
  }

  // Histórico
  for (const r of DATA.historico) {
    if (!r.hi || !r.hf || !r.p) continue;
    const dInicio = safeDate(r.hi);
    const dFin = safeDate(r.hf);
    if (!dInicio || !dFin) continue;
    const dur = (dFin - dInicio) / 60000;
    if (!isFinite(dur) || isNaN(dur) || dur < 0 || dur > 1440) continue;

    let status = 'ok'; // por defecto OK si no hay hora teórica
    if (r.ht) {
      const fechaBase = (r.d || r.hi).substring(0,10);
      const horaTeo = safeDate(`${fechaBase}T${r.ht}`);
      if (horaTeo && dFin > horaTeo) status = 'ko';
    }
    if (dur < 2 && status === 'ok') status = 'susp';
    const fecha = (r.d || r.hi).substring(0,10);
    all.push({tarea:r.t, persona:r.p, fecha, status, duracionMin:dur});
  }

  // Ejecuciones (último mes precargado + acciones de la demo)
  for (const [k,v] of Object.entries(STATE.ejecuciones)) {
    if (!v.fin || !v.inicio) continue;
    const [fecha, nombre, persona] = k.split('::');
    const dInicio = safeDate(v.inicio);
    const dFin = safeDate(v.fin);
    if (!dInicio || !dFin) continue;
    const dur = (dFin - dInicio) / 60000;
    if (!isFinite(dur) || isNaN(dur) || dur < 0 || dur > 1440) continue;
    all.push({tarea:nombre, persona, fecha, status:v.status, duracionMin:dur});
  }

  // Filtros
  const fInicio = window._kpiFilters?.inicio || '2025-01-01';
  const fFin = window._kpiFilters?.fin || todayISO();
  const fPersona = window._kpiFilters?.persona || '';

  // Helper: descomponer binomio en personas individuales
  // Ej. "Carlos/Ana" → ["Carlos","Ana"], "Carlos+Ana" → ["Carlos","Ana"]
  function descomponer(persona) {
    if (!persona) return [];
    if (persona === 'TODOS') return operativos();
    if (persona.includes('/')) return persona.split('/').map(s => s.trim());
    if (persona.includes('+')) return persona.split('+').map(s => s.trim());
    return [persona];
  }

  // Filtrar por rango de fechas (siempre)
  const filt = all.filter(r => r.fecha >= fInicio && r.fecha <= fFin);

  // Para el filtro por persona: si el filtro es "Carlos", incluyo registros donde la persona sea "Carlos" o un binomio que contenga Carlos
  const filtPersonal = fPersona ? filt.filter(r => descomponer(r.persona).includes(fPersona)) : filt;

  // KPIs globales (sobre filtPersonal)
  const total = filtPersonal.length;
  const okCount = filtPersonal.filter(r => r.status === 'ok').length;
  const koCount = filtPersonal.filter(r => r.status === 'ko').length;
  const suspCount = filtPersonal.filter(r => r.status === 'susp').length;
  const pctOK = total ? (okCount*100/total).toFixed(1) : '0';
  const pctKO = total ? (koCount*100/total).toFixed(1) : '0';
  const pctSusp = total ? (suspCount*100/total).toFixed(1) : '0';
  const durPromedio = total ? (filtPersonal.reduce((s,r)=>s+r.duracionMin,0)/total).toFixed(1) : '0';

  // Ranking por persona INDIVIDUAL (descomponiendo binomios)
  const porPersona = {};
  for (const r of filt) {
    const personas = descomponer(r.persona);
    for (const p of personas) {
      if (!porPersona[p]) porPersona[p] = {ok:0,ko:0,susp:0,total:0,durTotal:0};
      porPersona[p][r.status==='ok'?'ok':r.status==='ko'?'ko':'susp']++;
      porPersona[p].total++;
      porPersona[p].durTotal += r.duracionMin;
    }
  }
  const rankingArr = Object.entries(porPersona)
    .filter(([p]) => operativos().includes(p))  // solo operativos individuales
    .map(([p, d]) => ({
      persona: p,
      total: d.total,
      pctOK: d.total ? (d.ok*100/d.total).toFixed(1) : '0',
      pctKO: d.total ? (d.ko*100/d.total).toFixed(1) : '0',
      pctSusp: d.total ? (d.susp*100/d.total).toFixed(1) : '0',
      durMedia: d.total ? (d.durTotal/d.total).toFixed(1) : '0'
    }))
    .sort((a,b) => parseFloat(b.pctOK) - parseFloat(a.pctOK));

  // Ranking por TAREA (minutos medios, % OK, frecuencia)
  const porTarea = {};
  for (const r of filt) {
    if (!r.tarea) continue;
    if (!isFinite(r.duracionMin)) continue;
    const t = r.tarea.trim();
    if (!porTarea[t]) porTarea[t] = {total:0, ok:0, ko:0, susp:0, durTotal:0, durMin:Infinity, durMax:0};
    porTarea[t].total++;
    porTarea[t][r.status==='ok'?'ok':r.status==='ko'?'ko':'susp']++;
    porTarea[t].durTotal += r.duracionMin;
    if (r.duracionMin < porTarea[t].durMin) porTarea[t].durMin = r.duracionMin;
    if (r.duracionMin > porTarea[t].durMax) porTarea[t].durMax = r.duracionMin;
  }
  const tareasArr = Object.entries(porTarea)
    .filter(([_,d]) => d.total >= 5) // al menos 5 ejecuciones para que sea estadísticamente útil
    .map(([t,d]) => ({
      tarea: t,
      total: d.total,
      durMedia: d.total ? d.durTotal/d.total : 0,
      durMin: isFinite(d.durMin) ? d.durMin : 0,
      durMax: d.durMax,
      pctOK: d.total ? d.ok*100/d.total : 0,
      pctSusp: d.total ? d.susp*100/d.total : 0
    }));
  const tareasMasLargas = [...tareasArr].sort((a,b) => b.durMedia - a.durMedia).slice(0,10);
  const tareasMasCortas = [...tareasArr].sort((a,b) => a.durMedia - b.durMedia).slice(0,10);
  const tareasMasSusp = [...tareasArr].sort((a,b) => b.pctSusp - a.pctSusp).slice(0,10);

  // Evolución mensual (sobre filtPersonal)
  const porMes = {};
  for (const r of filtPersonal) {
    const ym = r.fecha.substring(0,7);
    if (!porMes[ym]) porMes[ym] = {ok:0,ko:0,susp:0};
    porMes[ym][r.status==='ok'?'ok':r.status==='ko'?'ko':'susp']++;
  }
  const meses = Object.keys(porMes).sort();

  // Personas únicas (descomponiendo binomios)
  const personasUnicasSet = new Set();
  for (const r of all) descomponer(r.persona).forEach(p => personasUnicasSet.add(p));
  const personasUnicas = [...personasUnicasSet].filter(p => operativos().includes(p)).sort();

  // Sub-vista de KPIs (overview / por tarea)
  const sub = window._kpiSub || 'overview';

  document.getElementById('view-kpis').innerHTML = `
    <div class="view-header">
      <div>
        <div class="view-title">KPIs y estadísticas</div>
        <div class="view-sub">${total.toLocaleString('es-ES')} ejecuciones analizadas${fPersona?` · filtro: ${fPersona}`:''}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="date" value="${fInicio}" onchange="setKpiFilter('inicio',this.value)" style="background:var(--panel-2);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-family:inherit">
        <span class="muted">→</span>
        <input type="date" value="${fFin}" onchange="setKpiFilter('fin',this.value)" style="background:var(--panel-2);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-family:inherit">
        <select onchange="setKpiFilter('persona',this.value)" style="background:var(--panel-2);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-family:inherit">
          <option value="">Todas las personas</option>
          ${personasUnicas.map(p=>`<option value="${p}" ${p===fPersona?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>
    </div>

    <div style="display:flex;gap:6px;margin-bottom:14px">
      <button class="btn btn-sm ${sub==='overview'?'btn-primary':''}" onclick="window._kpiSub='overview';renderKPIs()">Resumen</button>
      <button class="btn btn-sm ${sub==='tareas'?'btn-primary':''}" onclick="window._kpiSub='tareas';renderKPIs()">Por tarea (minutos)</button>
    </div>

    ${sub === 'overview' ? `
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="label">% OK</div>
          <div class="value" style="color:var(--ok)">${pctOK}%</div>
          <div class="delta">${okCount.toLocaleString('es-ES')} tareas finalizadas a tiempo</div>
        </div>
        <div class="kpi-card">
          <div class="label">% KO</div>
          <div class="value" style="color:var(--ko)">${pctKO}%</div>
          <div class="delta">${koCount.toLocaleString('es-ES')} fuera de plazo</div>
        </div>
        <div class="kpi-card">
          <div class="label">% Sospechosas</div>
          <div class="value" style="color:var(--susp)">${pctSusp}%</div>
          <div class="delta">${suspCount.toLocaleString('es-ES')} cerradas en menos de 2 min</div>
        </div>
        <div class="kpi-card">
          <div class="label">Duración media</div>
          <div class="value">${durPromedio}<span style="font-size:14px;color:var(--muted)">min</span></div>
          <div class="delta">por tarea</div>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <h3>Evolución mensual (OK / KO / Sospechosas)</h3>
          <div class="chart-box"><canvas id="chartEvol"></canvas></div>
        </div>
        <div class="chart-card">
          <h3>Distribución global</h3>
          <div class="chart-box"><canvas id="chartDist"></canvas></div>
        </div>
      </div>

      <div class="chart-card" style="margin-bottom:18px">
        <h3>Ranking por operativo <span class="muted" style="font-size:11px;font-weight:400">· tareas en binomio cuentan para todos los miembros</span></h3>
        <table class="data">
          <thead><tr>
            <th>Persona</th><th>Tareas</th><th>% OK</th><th>% KO</th><th>% Sospechosas</th><th>Duración media</th>
          </tr></thead>
          <tbody>
            ${rankingArr.map(r => `<tr>
              <td><span class="persona-dot" style="background:${colorPersona(r.persona)};display:inline-block;margin-right:8px"></span>${r.persona}</td>
              <td>${r.total.toLocaleString('es-ES')}</td>
              <td><div class="bar-cell"><div class="bar"><span style="width:${r.pctOK}%;background:var(--ok)"></span></div><div class="num">${r.pctOK}%</div></div></td>
              <td><div class="bar-cell"><div class="bar"><span style="width:${r.pctKO}%;background:var(--ko)"></span></div><div class="num">${r.pctKO}%</div></div></td>
              <td><div class="bar-cell"><div class="bar"><span style="width:${r.pctSusp}%;background:var(--susp)"></span></div><div class="num">${r.pctSusp}%</div></div></td>
              <td>${r.durMedia} min</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    ` : `
      <div class="charts-grid" style="grid-template-columns:1fr 1fr">
        <div class="chart-card">
          <h3>⏱ Top 10 tareas más largas (min de media)</h3>
          <div class="chart-box"><canvas id="chartLargas"></canvas></div>
        </div>
        <div class="chart-card">
          <h3>⚡ Top 10 tareas más cortas</h3>
          <div class="chart-box"><canvas id="chartCortas"></canvas></div>
        </div>
      </div>

      <div class="chart-card" style="margin-bottom:18px">
        <h3>📋 Detalle por tarea (mínimo 5 ejecuciones)</h3>
        <div class="muted" style="font-size:12px;margin-bottom:10px">${tareasArr.length} tareas analizadas. Ordenadas por duración media descendente.</div>
        <div style="max-height:520px;overflow:auto">
          <table class="data">
            <thead><tr>
              <th>Tarea</th><th>Ejecuciones</th><th>Min media</th><th>Min mín</th><th>Min máx</th><th>% OK</th><th>% Sosp.</th>
            </tr></thead>
            <tbody>
              ${[...tareasArr].sort((a,b)=>b.durMedia-a.durMedia).map(t => `<tr>
                <td style="font-size:12px">${t.tarea}</td>
                <td>${t.total.toLocaleString('es-ES')}</td>
                <td><strong>${t.durMedia.toFixed(1)}</strong></td>
                <td class="muted">${t.durMin.toFixed(1)}</td>
                <td class="muted">${t.durMax.toFixed(0)}</td>
                <td>${t.pctOK.toFixed(1)}%</td>
                <td>${t.pctSusp.toFixed(1)}%</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="chart-card" style="margin-bottom:18px">
        <h3>⚠ Tareas con más cierres sospechosos (&lt;2 min)</h3>
        <div class="muted" style="font-size:12px;margin-bottom:10px">Indicador de posibles "cierres exprés" sin trabajo real detrás.</div>
        <table class="data">
          <thead><tr><th>Tarea</th><th>Ejecuciones</th><th>% Sospechoso</th></tr></thead>
          <tbody>
            ${tareasMasSusp.filter(t=>t.pctSusp>0).map(t => `<tr>
              <td style="font-size:12px">${t.tarea}</td>
              <td>${t.total.toLocaleString('es-ES')}</td>
              <td><div class="bar-cell"><div class="bar"><span style="width:${t.pctSusp}%;background:var(--susp)"></span></div><div class="num">${t.pctSusp.toFixed(1)}%</div></div></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `}
  `;

  // Charts (overview)
  setTimeout(()=>{
    if (window._chartEvol) { window._chartEvol.destroy(); window._chartEvol = null; }
    if (window._chartDist) { window._chartDist.destroy(); window._chartDist = null; }
    if (window._chartLargas) { window._chartLargas.destroy(); window._chartLargas = null; }
    if (window._chartCortas) { window._chartCortas.destroy(); window._chartCortas = null; }

    if (sub === 'overview') {
      const ctxE = document.getElementById('chartEvol');
      if (ctxE) {
        window._chartEvol = new Chart(ctxE, {
          type: 'line',
          data: {
            labels: meses,
            datasets: [
              {label:'OK', data: meses.map(m=>porMes[m].ok), borderColor:'#22c55e', backgroundColor:'rgba(34,197,94,.1)', tension:.3, fill:true},
              {label:'KO', data: meses.map(m=>porMes[m].ko), borderColor:'#ef4444', backgroundColor:'rgba(239,68,68,.1)', tension:.3, fill:true},
              {label:'Sospechosas', data: meses.map(m=>porMes[m].susp), borderColor:'#a855f7', backgroundColor:'rgba(168,85,247,.1)', tension:.3, fill:true}
            ]
          },
          options: {
            responsive:true, maintainAspectRatio:false,
            plugins:{legend:{labels:{color:'#e6edf3'}}},
            scales:{
              x:{ticks:{color:'#8b95a3'}, grid:{color:'rgba(255,255,255,.04)'}},
              y:{ticks:{color:'#8b95a3'}, grid:{color:'rgba(255,255,255,.04)'}}
            }
          }
        });
      }

      const ctxD = document.getElementById('chartDist');
      if (ctxD) {
        window._chartDist = new Chart(ctxD, {
          type: 'doughnut',
          data: {
            labels: ['OK','KO','Sospechosas'],
            datasets:[{data:[okCount, koCount, suspCount], backgroundColor:['#22c55e','#ef4444','#a855f7'], borderColor:'#161b22', borderWidth:3}]
          },
          options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{legend:{labels:{color:'#e6edf3'}}}
          }
        });
      }
    }

    if (sub === 'tareas') {
      const ctxL = document.getElementById('chartLargas');
      if (ctxL) {
        window._chartLargas = new Chart(ctxL, {
          type:'bar',
          data:{
            labels: tareasMasLargas.map(t => t.tarea.length > 28 ? t.tarea.substring(0,26)+'…' : t.tarea),
            datasets:[{label:'Minutos medios', data: tareasMasLargas.map(t=>t.durMedia.toFixed(1)), backgroundColor:'rgba(239,68,68,.7)', borderColor:'#ef4444', borderWidth:1}]
          },
          options:{
            indexAxis:'y',responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{
              x:{ticks:{color:'#8b95a3'}, grid:{color:'rgba(255,255,255,.04)'}},
              y:{ticks:{color:'#8b95a3', font:{size:10}}, grid:{display:false}}
            }
          }
        });
      }
      const ctxC = document.getElementById('chartCortas');
      if (ctxC) {
        window._chartCortas = new Chart(ctxC, {
          type:'bar',
          data:{
            labels: tareasMasCortas.map(t => t.tarea.length > 28 ? t.tarea.substring(0,26)+'…' : t.tarea),
            datasets:[{label:'Minutos medios', data: tareasMasCortas.map(t=>t.durMedia.toFixed(1)), backgroundColor:'rgba(34,197,94,.7)', borderColor:'#22c55e', borderWidth:1}]
          },
          options:{
            indexAxis:'y',responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{
              x:{ticks:{color:'#8b95a3'}, grid:{color:'rgba(255,255,255,.04)'}},
              y:{ticks:{color:'#8b95a3', font:{size:10}}, grid:{display:false}}
            }
          }
        });
      }
    }
  }, 50);
}

function setKpiFilter(k, v) {
  if (!window._kpiFilters) window._kpiFilters = {};
  window._kpiFilters[k] = v;
  renderKPIs();
}

// ----- CATÁLOGO -----
function renderCatalogo() {
  const tipo = window._catTipo || 'diarias';
  const data = tipo === 'diarias' ? DATA.tareas_diarias
             : tipo === 'mensuales' ? DATA.tareas_mensuales
             : DATA.tareas_puntuales;

  document.getElementById('view-catalogo').innerHTML = `
    <div class="view-header">
      <div>
        <div class="view-title">Catálogo de tareas</div>
        <div class="view-sub">${DATA.tareas_diarias.length} diarias · ${DATA.tareas_mensuales.length} mensuales · ${DATA.tareas_puntuales.length} puntuales</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm ${tipo==='diarias'?'btn-primary':''}" onclick="window._catTipo='diarias';render()">Diarias</button>
        <button class="btn btn-sm ${tipo==='mensuales'?'btn-primary':''}" onclick="window._catTipo='mensuales';render()">Mensuales</button>
        <button class="btn btn-sm ${tipo==='puntuales'?'btn-primary':''}" onclick="window._catTipo='puntuales';render()">Puntuales</button>
      </div>
    </div>

    <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:auto;max-height:calc(100vh - 230px)">
      <table class="data">
        <thead><tr>
          <th>Tarea</th>
          ${tipo==='diarias' ? '<th>Días</th><th>Hora</th><th>Habitual</th><th>Suplente</th>' : ''}
          ${tipo==='mensuales' ? '<th>Repetitividad</th><th>Próx. fecha</th><th>Hora</th><th>Habitual</th>' : ''}
          ${tipo==='puntuales' ? '<th>Fecha</th><th>Hora</th><th>Persona</th>' : ''}
        </tr></thead>
        <tbody>
          ${data.map(t => {
            if (tipo === 'diarias') {
              const dias = Object.entries(t.dias).filter(([k,v])=>v).map(([k])=>k).join(' ');
              return `<tr>
                <td>${t.tarea}</td>
                <td style="font-family:monospace;font-size:11px">${dias}</td>
                <td style="font-family:monospace">${t.hora||'—'}</td>
                <td>${t.persona_habitual||'—'}</td>
                <td class="muted">${t.suplente||'—'}</td>
              </tr>`;
            }
            if (tipo === 'mensuales') {
              return `<tr>
                <td>${t.descripcion}</td>
                <td>${t.repetitividad||'—'}</td>
                <td>${t.fecha_proxima ? t.fecha_proxima.substring(0,10) : '—'}</td>
                <td style="font-family:monospace">${t.hora||'—'}</td>
                <td>${t.persona_habitual||'—'}</td>
              </tr>`;
            }
            return `<tr>
              <td>${t.descripcion}</td>
              <td>${t.fecha ? t.fecha.substring(0,10) : '—'}</td>
              <td style="font-family:monospace">${t.hora||'—'}</td>
              <td>${t.persona_habitual||'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ----------------------------------------------------------------------
// TOAST
// ----------------------------------------------------------------------
function toast(msg, type='info') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ----------------------------------------------------------------------
// INIT
// ----------------------------------------------------------------------
loadState();
render();

</script>

</body>
</html>
